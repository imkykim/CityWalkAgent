    function setLookaheadDepth(n) {
      currentLookaheadDepth = n;
      document.querySelectorAll('.depth-btn').forEach(btn => {
        btn.classList.toggle('active-depth', parseInt(btn.dataset.depth) === n);
      });
    }

    async function autoWalkStart() {
      const startLat = parseFloat(document.getElementById('aw-start-lat').value);
      const startLng = parseFloat(document.getElementById('aw-start-lng').value);
      const destLat  = parseFloat(document.getElementById('aw-dest-lat').value);
      const destLng  = parseFloat(document.getElementById('aw-dest-lng').value);
      const maxSteps = parseInt(document.getElementById('aw-max-steps').value) || 40;
      if (isNaN(startLat)||isNaN(startLng)||isNaN(destLat)||isNaN(destLng)) {
        showAwError('Enter valid coordinates.'); return;
      }
      clearAwError();

      // Reset map
      autoWalkReset(true);
      walkStepCount = 0;
      document.getElementById('topbar-progress').textContent = 'Starting…';
      document.getElementById('s2-feed').innerHTML = '';
      document.getElementById('bp-s2').style.display = 'flex';
      document.getElementById('bp-chart').style.display = 'flex';
      document.getElementById('bp-chart-drag').style.display = '';
      initScoreChart();
      initRadarChart();

      // Close settings panel when walk starts
      if (settingsOpen) toggleSettings();

      // Place destination marker
      destMarker = L.circleMarker([destLat, destLng], {
        radius: 8, color: '#ff453a', fillColor: '#ff453a', fillOpacity: 0.9, weight: 2
      }).bindTooltip('Destination').addTo(map);

      document.getElementById('topbar-start-btn').disabled = true;
      document.getElementById('topbar-stop-btn').style.display = '';

      log(`Auto walk: (${startLat},${startLng}) → (${destLat},${destLng}) max=${maxSteps}`);

      try {
        const res = await fetch(`${API}/api/walk/start`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            start_lat: startLat, start_lng: startLng,
            dest_lat: destLat, dest_lng: destLng,
            persona: currentPersona, max_steps: maxSteps,
            lookahead_depth: currentLookaheadDepth,
            urgency_mode: document.getElementById('aw-urgency-mode').value || null,
          }),
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail||res.statusText); }
        const { walk_id } = await res.json();
        currentWalkId = walk_id;
        log(`Walk started: ${walk_id}`, 'ok');
        setStatus(`Walking… id=${walk_id}`);

        showAnalysisBadge(true, 'Analysing…');
        walkEventSource = new EventSource(`${API}/api/walk/stream/${walk_id}`);
        walkEventSource.onmessage = e => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'step')            handleWalkStep(msg.data);
            if (msg.type === 'complete')        handleWalkComplete(msg.data);
            if (msg.type === 'branch_start')    handleBranchStart(msg.data);
            if (msg.type === 'branch_progress') handleBranchProgress(msg.data);
            if (msg.type === 'route_report')    handleRouteReport(msg.data);
            if (msg.type === 'planned_route')   handlePlannedRoute(msg.data);
            if (msg.type === 'error') {
              const errMsg = msg.data?.message || 'Walk error';
              showAnalysisBadge(false);
              showAwError(errMsg);
              setStatus(`Walk failed: ${errMsg}`);
              log(`Walk error: ${errMsg}`, 'err');
              autoWalkReset(false);
            }
          } catch(err) { log(`SSE parse error: ${err.message}`, 'warn'); }
        };
        walkEventSource.onerror = () => {
          if (currentWalkId) {
            const msg = 'SSE connection lost';
            showAnalysisBadge(false);
            showAwError(msg);
            setStatus(msg);
            log(msg, 'warn');
            autoWalkReset(false);
          }
        };
      } catch(e) {
        showAwError(e.message); log(`autoWalkStart error: ${e.message}`, 'err');
        autoWalkReset(false);
      }
    }

    function scoreToColor(avg) {
      if (avg >= 8) return '#10b981';
      if (avg >= 6) return '#84cc16';
      if (avg >= 4) return '#f59e0b';
      return '#ef4444';
    }

    // ── Branch visualization ─────────────────────────────────────────────
    // State for live branch exploration
    let _branchOrigin = null;          // [lat, lng] of intersection
    let _branchCandidates = [];        // [{direction, heading}] from branch_start
    let _branchExploreLines = {};      // direction → [L.polyline, ...] (live exploration path)
    let _branchExplorePts = {};        // direction → [[lat,lng], ...] accumulated chain
    let _branchRejectedLines = [];     // kept as grey after resolution

    function clearBranchGhosts() {
      branchGhostMarkers.forEach(m => map.removeLayer(m));
      branchLines.forEach(l => map.removeLayer(l));
      branchGhostMarkers = [];
      branchLines = [];
    }

    function clearBranchVisualization() {
      document.getElementById('branch-overlay').classList.remove('active');
      document.getElementById('sv-wrap').style.visibility = '';
      const cards = document.getElementById('branch-cards');
      cards.classList.remove('active');
      cards.innerHTML = '';
      document.getElementById('bp-center').classList.remove('branch-active');
      document.getElementById('bp-center-label').textContent = 'Scores';
      clearBranchGhosts();
      // Clear live explore lines
      Object.values(_branchExploreLines).forEach(segs => segs.forEach(s => map.removeLayer(s)));
      _branchExploreLines = {};
      _branchExplorePts = {};
      _branchOrigin = null;
      _branchCandidates = [];
      isBranching = false;
    }

    // Called when backend starts branch exploration at an intersection
    function handleBranchStart(data) {
      isBranching = true;
      _branchOrigin = [data.lat, data.lng];
      _branchCandidates = data.candidates || [];
      _branchExploreLines = {};
      _branchExplorePts = {};

      // Initialize per-direction state and add direction-arrow ghost markers
      _branchCandidates.forEach(c => {
        _branchExploreLines[c.direction] = [];
        _branchExplorePts[c.direction] = [_branchOrigin];

        // Directional ghost marker (pulsing dot offset slightly from origin)
        const rad = (c.heading * Math.PI) / 180;
        const d = 0.00012;
        const gLat = _branchOrigin[0] + d * Math.cos(rad);
        const gLng = _branchOrigin[1] + d * Math.sin(rad) / Math.cos(_branchOrigin[0] * Math.PI / 180);
        const ghostIcon = L.divIcon({
          className: '',
          html: `<div style="width:12px;height:12px;border-radius:50%;background:#ff9f0a;border:2px solid #fff;box-shadow:0 0 5px rgba(255,159,10,0.8)" class="ghost-pulse"></div>`,
          iconSize: [12, 12], iconAnchor: [6, 6],
        });
        const gm = L.marker([gLat, gLng], { icon: ghostIcon, zIndexOffset: 500 }).addTo(map);
        branchGhostMarkers.push(gm);
      });

      // Hide the Street View panorama so Google SV iframe can't bleed through overlay
      document.getElementById('sv-wrap').style.visibility = 'hidden';

      // Open the split-view overlay with spinners
      const overlay = document.getElementById('branch-overlay');
      const thumbsEl = document.getElementById('branch-thumbs');
      thumbsEl.innerHTML = '';
      overlay.classList.add('active');

      _branchCandidates.forEach(c => {
        const div = document.createElement('div');
        div.className = 'branch-thumb';
        div.id = `branch-thumb-${c.direction}`;
        div.innerHTML = `
          <div class="branch-thumb-spinner"><div class="mini-spin"></div></div>
          <div class="branch-thumb-label">
            <span>${escHtml(c.direction)}</span>
            <span style="font-size:9px;color:#ccc">${c.heading.toFixed(0)}°</span>
          </div>`;
        thumbsEl.appendChild(div);
      });

      showAnalysisBadge(true, 'Exploring branches…');
    }

    // Called each time one VLM result arrives during branch exploration
    function handleBranchProgress(data) {
      if (!_branchOrigin) return;
      const dir = data.direction;
      const panoId = data.pano_id;
      const heading = data.heading;

      // Update Street View thumbnail for this direction slot
      const thumb = document.getElementById(`branch-thumb-${dir}`);
      if (thumb && _mapsApiKey && panoId) {
        const spinner = thumb.querySelector('.branch-thumb-spinner');
        const img = new Image();
        img.onload = () => {
          if (spinner) spinner.remove();
          // Remove any existing img in this thumb
          thumb.querySelectorAll('img').forEach(el => el.remove());
          img.className = '';
          thumb.appendChild(img);
        };
        img.src = `https://maps.googleapis.com/maps/api/streetview?size=800x300&pano=${panoId}&heading=${heading}&pitch=0&fov=90&key=${_mapsApiKey}`;
      }

      // Update score badge on thumb
      if (thumb && data.scores && Object.keys(data.scores).length) {
        const vals = Object.values(data.scores);
        const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
        let badge = thumb.querySelector('.branch-score-badge');
        if (!badge) {
          badge = document.createElement('div');
          badge.className = 'branch-score-badge';
          badge.style.cssText = 'position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;';
          thumb.appendChild(badge);
        }
        badge.textContent = `avg ${avg.toFixed(1)}`;
        badge.style.color = scoreToColor(avg);
      }

      // Extend the map exploration path for this direction using pano metadata
      // We approximate position by offsetting from origin along heading by depth * ~20m
      if (_branchExplorePts[dir]) {
        const depth = _branchExplorePts[dir].length;  // 0-indexed chain length
        const distPerStep = 0.000185; // ~20m in degrees lat
        const rad = (heading * Math.PI) / 180;
        const prevPt = _branchExplorePts[dir][_branchExplorePts[dir].length - 1];
        const newLat = prevPt[0] + distPerStep * Math.cos(rad);
        const newLng = prevPt[1] + distPerStep * Math.sin(rad) / Math.cos(prevPt[0] * Math.PI / 180);
        const newPt = [newLat, newLng];
        _branchExplorePts[dir].push(newPt);

        const scores = data.scores || {};
        const vals2 = Object.values(scores);
        const avg2 = vals2.length ? vals2.reduce((a, b) => a + b, 0) / vals2.length : 5;
        const seg = L.polyline([prevPt, newPt], {
          color: scoreToColor(avg2),
          weight: 3,
          opacity: 0.9,
          dashArray: '6 3',
        }).addTo(map);
        _branchExploreLines[dir].push(seg);
      }
    }

    // Called from handleWalkStep when branch_candidates arrives (exploration complete)
    function resolveBranchEvaluation(step) {
      const candidates = step.branch_candidates || [];
      candidates.forEach(c => {
        const thumb = document.getElementById(`branch-thumb-${c.direction}`);
        if (thumb) thumb.classList.add(c.chosen ? 'chosen' : 'rejected');

        // Turn rejected exploration lines grey
        if (!c.chosen && _branchExploreLines[c.direction]) {
          _branchExploreLines[c.direction].forEach(seg => {
            seg.setStyle({ color: '#aaaaaa', opacity: 0.35, dashArray: '4 4', weight: 2 });
          });
          // Keep grey lines on map — move them to branchLines for later cleanup
          _branchExploreLines[c.direction].forEach(s => _branchRejectedLines.push(s));
          _branchExploreLines[c.direction] = [];
        }
        // Remove chosen direction's dashed lines (will be redrawn as solid by handleWalkStep)
        if (c.chosen && _branchExploreLines[c.direction]) {
          _branchExploreLines[c.direction].forEach(seg => map.removeLayer(seg));
          _branchExploreLines[c.direction] = [];
        }
      });

      // Immediately collapse overlay → restore SV and switch to chosen pano
      document.getElementById('branch-overlay').classList.remove('active');
      document.getElementById('sv-wrap').style.visibility = '';
      clearBranchGhosts();
      if (step._pendingPano) {
        setPanorama(step._pendingPano, step._pendingHeading);
        showAnalysisBadge(true, 'Analysing…');
      }
      // Cards stay visible until next step clears them via clearBranchVisualization

      _branchExploreLines = {};
      _branchExplorePts = {};
      isBranching = false;
    }

    function showBranchCards(step) {
      if (!step.branch_candidates || !step.branch_candidates.length) return;
      const cards = document.getElementById('branch-cards');
      const center = document.getElementById('bp-center');
      cards.innerHTML = '';

      step.branch_candidates.forEach(c => {
        const card = document.createElement('div');
        card.className = `branch-card${c.chosen ? ' chosen' : ' rejected'}`;
        const scores = c.scores || {};
        const scoreRows = Object.entries(scores).map(([k, v]) =>
          `<div class="dim"><span class="dim-name">${escHtml(k)}</span><span class="dim-val">${v.toFixed(1)}</span></div>`
        ).join('');
        const trendIcon = c.trend === 'improving' ? '↑' : (c.trend === 'declining' ? '↓' : '→');
        const avgStr = c.avg_score != null ? ` · avg ${c.avg_score.toFixed(1)}` : '';
        card.innerHTML = `
          <div class="branch-card-dir">${c.chosen ? '✓ ' : ''}${escHtml(c.direction)} <span style="font-size:10px;color:var(--text-3)">${trendIcon}${avgStr}</span></div>
          <div class="branch-card-scores">${scoreRows}</div>
          ${c.interpretation ? `<div class="branch-card-interp">${escHtml(c.interpretation)}</div>` : ''}
          ${c.key_concern ? `<div class="branch-card-concern">⚠ ${escHtml(c.key_concern)}</div>` : ''}
        `;
        cards.appendChild(card);
      });

      cards.classList.add('active');
      center.classList.add('branch-active');
      document.getElementById('bp-center-label').textContent = 'Branch Evaluation';
    }

    // ═══════════════════════════════════════════════════════
    // PLANNED ROUTE POLYLINE
    // ═══════════════════════════════════════════════════════

    function handlePlannedRoute(data) {
      if (plannedRouteLine) { map.removeLayer(plannedRouteLine); plannedRouteLine = null; }
      if (!data.waypoints || !data.waypoints.length) return;
      plannedRouteLine = L.polyline(data.waypoints, {
        color: '#6366f1',
        weight: 2.5,
        opacity: 0.3,
        dashArray: '8, 6',
      }).addTo(map);
      plannedRouteLine.bringToBack();
      log(`Planned route: ${data.waypoints.length} waypoints`, 'info');
    }

    // ═══════════════════════════════════════════════════════
    // ASYNC HEADLINE + SPEECH BUBBLES
    // ═══════════════════════════════════════════════════════

    async function fetchStepSummary(step) {
      if (lastSummaryAbort) lastSummaryAbort.abort();
      lastSummaryAbort = new AbortController();

      const reasoning = step.reasoning || {};
      const reasoningText = Object.values(reasoning).join(' ').slice(0, 600);
      const scores = step.scores || {};
      const vals = Object.values(scores);
      const avg = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 5;
      const prevAvg = step._prevAvg ?? null;

      const scoresStr = Object.entries(scores).map(([k, v]) => `${k}:${v.toFixed(1)}`).join(', ');

      const prompt = `You are summarizing a pedestrian agent's urban environment observation.

Scores: ${scoresStr} (average: ${avg.toFixed(1)}/10)
Observation: ${reasoningText}

Respond ONLY with valid JSON (no markdown, no explanation):
{
  "headline": "<one sentence, max 20 words, third-person observation of the environment>",
  "is_key_moment": <true if avg>=8.5 or avg<=4.0 or score changed dramatically or this is a decision point, else false>,
  "bubble": "<max 15 chars, casual first-person, Korean or English matching the persona, e.g. '그늘 많아서 좋아!' or 'Lovely shade here!'>"
}`;

      try {
        const resp = await fetch(SUMMARIZER_URL, {
          method: 'POST',
          signal: lastSummaryAbort.signal,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUMMARIZER_API_KEY}`,
          },
          body: JSON.stringify({
            model: SUMMARIZER_MODEL,
            max_tokens: 120,
            enable_thinking: false,
            messages: [{ role: 'user', content: prompt }],
          }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const text = data.choices?.[0]?.message?.content || '';
        // Strip <think>...</think> blocks (Qwen3 reasoning leak safety)
        const clean = text.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
        // Extract JSON — find first { ... }
        const jsonMatch = clean.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('No JSON in response');
        return JSON.parse(jsonMatch[0]);
      } catch(e) {
        if (e.name === 'AbortError') return null;
        log(`Summary fetch failed: ${e.message}`, 'warn');
        return null;
      }
    }

    function renderHeadline(result) {
      const area = document.getElementById('headline-area');
      if (!result || !result.headline) { area.style.display = 'none'; return; }
      area.classList.remove('loading');
      area.textContent = result.headline;
      area.style.display = 'block';
      area.style.opacity = '0';
      requestAnimationFrame(() => { area.style.opacity = '1'; area.classList.add('visible'); });
    }

    function showSpeechBubble(step, result) {
      if (!result.is_key_moment || !result.bubble) return;
      if (!map) return;

      const latlng = [step.lat, step.lng];
      const vals = Object.values(step.scores || {});
      const avgScore = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 5;
      const sentiment = avgScore >= 6 ? 'positive' : 'negative';

      if (currentBubbleMarker) { map.removeLayer(currentBubbleMarker); currentBubbleMarker = null; }

      const bubbleHtml = `
        <div class="speech-bubble-wrapper">
          <div class="speech-bubble ${sentiment}">${escHtml(result.bubble)}</div>
        </div>`;
      const bubbleIcon = L.divIcon({
        html: bubbleHtml, className: 'speech-bubble-icon', iconAnchor: [14, 42],
      });
      currentBubbleMarker = L.marker(latlng, {
        icon: bubbleIcon, zIndexOffset: 800, interactive: false,
      }).addTo(map);

      // Fade out after 3s, then convert to persistent pin
      setTimeout(() => {
        if (currentBubbleMarker) {
          const el = currentBubbleMarker.getElement();
          if (el) el.style.opacity = '0';
          setTimeout(() => {
            if (currentBubbleMarker) { map.removeLayer(currentBubbleMarker); currentBubbleMarker = null; }
            addKeyMomentPin(latlng, result, avgScore);
          }, 500);
        }
      }, 3000);
    }

    function addKeyMomentPin(latlng, result, avgScore) {
      const emoji = avgScore >= 6 ? '💬' : '⚠️';
      const pinIcon = L.divIcon({
        html: `<div class="key-pin-icon" title="${escHtml(result.headline || result.bubble)}">${emoji}</div>`,
        className: '', iconAnchor: [8, 8],
      });
      const pin = L.marker(latlng, { icon: pinIcon, zIndexOffset: 600 }).addTo(map);
      pin.bindTooltip(result.headline || result.bubble, {
        permanent: false, direction: 'top',
      });
      keyMomentPins.push(pin);
    }

    // ── Walk step handler ────────────────────────────────────────────────

    function handleWalkStep(step) {
      walkStepCount++;
      const latlng = [step.lat, step.lng];
      navPoints.push(latlng);

      // Hide "Analysing..." badge — analysis complete
      showAnalysisBadge(false);

      // Map polyline — colored segment per step
      const currLatLng = [step.lat, step.lng];
      if (prevNavLatLng) {
        const scores = step.scores || {};
        const vals = Object.values(scores);
        const avg = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 5;
        const seg = L.polyline([prevNavLatLng, currLatLng], {
          color: scoreToColor(avg),
          weight: 4,
          opacity: 0.85,
        }).addTo(map);
        walkSegments.push(seg);
      }
      prevNavLatLng = currLatLng;

      // Waypoint dot: red circle for intersection, small blue for normal
      const dotColor = step.is_intersection ? '#ff9f0a' : '#0071e3';
      const dotRadius = step.is_intersection ? 6 : 3.5;
      const circle = L.circleMarker(latlng, {
        radius: dotRadius, color: dotColor, fillColor: dotColor, fillOpacity: 0.85, weight: 1.5
      }).addTo(map);
      walkCircles.push(circle);

      // Move agent marker
      if (navMarker) map.removeLayer(navMarker);
      navMarker = L.marker(latlng, { icon: agentIcon(true), zIndexOffset: 1000 }).addTo(map);
      map.panTo(latlng, { animate: true, duration: 0.3 });

      // Street View — defer pano switch when branch overlay is active
      if (step.branch_triggered) {
        // Will be set after overlay dismisses (resolveBranchEvaluation handles it)
        step._pendingPano = step.pano_id;
        step._pendingHeading = step.heading;
      } else {
        setPanorama(step.pano_id, step.heading);
      }
      setBadge(`Step ${step.step}`);

      // Agent view thumbnail (image the agent actually analyzed)
      if (step.image_base64) {
        const imgUrl = `data:image/jpeg;base64,${step.image_base64}`;
        setAnalysisOverlay(imgUrl, step.heading);
      } else {
        setAnalysisOverlay(null, null);
      }

      // Scores
      if (step.scores && Object.keys(step.scores).length) renderScores(step.scores);
      updateScoreChart(step);

      // Scoring reasoning (System 1 result)
      if (step.reasoning && Object.keys(step.reasoning).length) {
        renderReasoning(step.reasoning);
      }

      // Async headline + speech bubble (fire-and-forget, never blocks SSE processing)
      {
        const headlineArea = document.getElementById('headline-area');
        headlineArea.textContent = '';
        headlineArea.classList.remove('visible');
        headlineArea.classList.add('loading');
        headlineArea.style.display = 'block';

        // Attach prevAvg from radarHistory (newest-first, index 1 = previous step)
        step._prevAvg = (() => {
          if (radarHistory.length >= 2) {
            const prev = radarHistory[1];
            const v = Object.values(prev);
            return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null;
          }
          return null;
        })();

        fetchStepSummary(step).then(result => {
          if (!result) return;
          renderHeadline(result);
          showSpeechBubble(step, result);
        });
      }

      // Progress
      setStatus(`Step ${step.step} · ${Math.round(step.dist_to_dest_m)}m remaining`);
      // walk-status under scores
      const wsEl = document.getElementById('walk-status');
      wsEl.style.display = '';
      document.getElementById('ws-step').textContent = step.step;
      document.getElementById('ws-dist').textContent = Math.round(step.dist_to_dest_m) + 'm';
      log(`Step ${step.step}: ${step.lat.toFixed(5)},${step.lng.toFixed(5)} dist=${step.dist_to_dest_m}m${step.is_intersection?' [intersec]':''}`, 'info');

      // Branch visualization — resolve after exploration SSEs have populated the overlay
      if (step.branch_triggered && step.branch_candidates && step.branch_candidates.length) {
        showBranchCards(step);
        resolveBranchEvaluation(step);
      } else {
        // Clear any leftover branch cards from previous intersection
        clearBranchVisualization();
      }

      // S2 feed: only for branch steps with a recommendation
      if (step.branch_triggered && step.recommendation) {
        addS2FeedItem(step);
      }

      // Show "Analysing..." for next step (branch steps defer this until overlay closes)
      if (!step.branch_triggered) showAnalysisBadge(true, 'Analysing…');
    }

    function addS2FeedItem(step) {
      const feed = document.getElementById('s2-feed');
      const tagClass = step.is_intersection ? 'intersection' : (step.trigger_reason === 'score_delta' ? 's2-trigger' : 'distance');
      const tagLabel = step.is_intersection ? '⑂ Intersection' : (step.trigger_reason || 'Rethink');
      const conf = step.confidence != null ? step.confidence : null;

      // Build candidate summary if available
      let candidateSummary = '';
      const candidates = step.branch_candidates || [];
      if (candidates.length) {
        const chosen = candidates.find(c => c.chosen);
        const others = candidates.filter(c => !c.chosen);
        const chosenStr = chosen ? `✓ ${escHtml(chosen.direction)} (${chosen.avg_score != null ? chosen.avg_score.toFixed(1) : '?'})` : '';
        const otherStr = others.map(c => `${escHtml(c.direction)} (${c.avg_score != null ? c.avg_score.toFixed(1) : '?'})`).join(', ');
        candidateSummary = `<div class="s2-meta" style="color:var(--accent)">${chosenStr}</div>`;
        if (otherStr) candidateSummary += `<div class="s2-meta" style="opacity:0.55">vs ${otherStr}</div>`;
      } else {
        const scores = step.scores || {};
        const scoreVals = Object.values(scores);
        const avgScore = scoreVals.length ? (scoreVals.reduce((a,b)=>a+b,0)/scoreVals.length).toFixed(1) : null;
        const topScores = Object.entries(scores).slice(0,3).map(([k,v])=>`${k}:${v.toFixed(1)}`).join(' ');
        if (avgScore) candidateSummary = `<div class="s2-meta">avg ${avgScore}${topScores ? ' · '+escHtml(topScores) : ''}</div>`;
      }

      const item = document.createElement('div');
      item.className = 's2-item';
      item.innerHTML = `
        <div>
          <span class="s2-tag ${tagClass}">${escHtml(tagLabel)}</span>
          <span style="font-size:10px;color:var(--text-3)">Step ${step.step} · ${Math.round(step.dist_to_dest_m)}m</span>
        </div>
        <div class="s2-reason">${escHtml(step.recommendation)}</div>
        ${candidateSummary}
        ${conf != null ? `<div class="s2-conf-bar-wrap"><div class="s2-conf-bar" style="width:${Math.round(conf*100)}%"></div></div>` : ''}
      `;
      feed.prepend(item);
      // Keep max 10 items
      while (feed.children.length > 10) feed.removeChild(feed.lastChild);
    }

    function handleWalkComplete(result) {
      showAnalysisBadge(false);
      if (result.route_report) handleRouteReport(result.route_report);
      const arrived = result.arrived ? '✓ Arrived' : '— Did not arrive';
      const steps = result.steps ?? walkStepCount;
      const dist = result.final_distance_m != null ? `${Math.round(result.final_distance_m)}m from dest` : '';
      const mem = result.memory_debug;
      const ltmInfo = mem ? ` · ${mem.snapshot_count ?? 0} snapshots · ${mem.episode_count ?? 0} episodes` : '';
      setStatus(`Walk complete — ${arrived} · ${steps} steps · ${dist}`);
      document.getElementById('ws-step').textContent = steps + ' (done)';
      document.getElementById('ws-dist').textContent = dist || '—';
      log(`Walk complete: arrived=${result.arrived} steps=${steps} dist=${dist}`, 'ok');
      autoWalkReset(false, !!result.route_report);
    }

    async function autoWalkStop() {
      if (!currentWalkId) return;
      const wid = currentWalkId;
      autoWalkReset(false);
      try {
        await fetch(`${API}/api/walk/stop/${wid}`, { method: 'POST' });
        log(`Walk ${wid} stopped`, 'info');
      } catch(e) { /* ignore */ }
    }

    // ═══════════════════════════════════════════════════════
    // ROUTE REPORT
    // ═══════════════════════════════════════════════════════

    function handleRouteReport(data) {
      log('Route report received: ' + (data.recommendation || '?'), 'ok');
      renderRouteReport(data);
    }

    function renderRouteReport(r) {
      const overlay  = document.getElementById('route-report-overlay');
      const persona  = document.getElementById('rr-persona');
      const badgeArea = document.getElementById('rr-badge-area');
      const body     = document.getElementById('rr-body');

      persona.textContent = currentPersona;

      const rec = r.recommendation || 'acceptable';
      const recLabel = rec === 'recommended' ? '✓ Recommended' : rec === 'avoid' ? '✗ Avoid' : '— Acceptable';
      badgeArea.innerHTML = `<span class="rr-badge ${rec}">${recLabel}</span>`;

      let html = '';

      if (r.executive_summary) {
        html += `<div class="rr-section">
          <div class="rr-section-title">Summary</div>
          <div class="rr-text">${escHtml(r.executive_summary)}</div>
        </div>`;
      }

      if (r.score_narrative) {
        html += `<div class="rr-section">
          <div class="rr-section-title">Experience</div>
          <div class="rr-text">${escHtml(r.score_narrative)}</div>
        </div>`;
      }

      if (r.dimension_verdicts && Object.keys(r.dimension_verdicts).length) {
        let dimHtml = '<div class="rr-dim-grid">';
        for (const [dim, verdict] of Object.entries(r.dimension_verdicts)) {
          dimHtml += `<div class="rr-dim-item">
            <div class="rr-dim-label">${escHtml(dim)}</div>
            <div class="rr-dim-verdict">${escHtml(verdict)}</div>
          </div>`;
        }
        dimHtml += '</div>';
        html += `<div class="rr-section">
          <div class="rr-section-title">Dimensions</div>
          ${dimHtml}
        </div>`;
      }

      if (r.segment_highlights && r.segment_highlights.length) {
        let hlHtml = '<ul class="rr-highlights">';
        for (const hl of r.segment_highlights) {
          const tag = hl.type || 'routine';
          hlHtml += `<li>
            <span class="rr-hl-tag ${tag}">${tag}</span>
            WP${hl.waypoint_id}: ${escHtml(hl.description || '')}
          </li>`;
        }
        hlHtml += '</ul>';
        html += `<div class="rr-section">
          <div class="rr-section-title">Key Moments</div>
          ${hlHtml}
        </div>`;
      }

      if (r.recommendation_reason || r.persona_suitability) {
        html += `<div class="rr-section">
          <div class="rr-section-title">Verdict</div>
          <div class="rr-text">${escHtml(r.recommendation_reason || '')}${r.persona_suitability ? ' ' + escHtml(r.persona_suitability) : ''}</div>
        </div>`;
      }

      if (r.navigation_note) {
        html += `<div class="rr-section">
          <div class="rr-section-title">Navigation</div>
          <div class="rr-text">${escHtml(r.navigation_note)}</div>
        </div>`;
      }

      body.innerHTML = html;
      overlay.classList.add('active');
    }

    function closeRouteReport() {
      document.getElementById('route-report-overlay').classList.remove('active');
    }

    function autoWalkReset(clearMap = false, preserveRouteReport = false) {
      if (!preserveRouteReport) {
        document.getElementById('route-report-overlay').classList.remove('active');
      }
      if (walkEventSource) { walkEventSource.close(); walkEventSource = null; }
      currentWalkId = null;
      document.getElementById('topbar-start-btn').disabled = false;
      document.getElementById('topbar-stop-btn').style.display = 'none';
      if (clearMap) document.getElementById('walk-status').style.display = 'none';
      radarHistory = [];
      if (radarChart) { radarChart.destroy(); radarChart = null; }
      initRadarChart();
      clearBranchVisualization();
      _branchRejectedLines.forEach(s => map.removeLayer(s)); _branchRejectedLines = [];

      // Headline
      const headlineArea = document.getElementById('headline-area');
      if (headlineArea) { headlineArea.style.display = 'none'; headlineArea.classList.remove('loading', 'visible'); }
      // Bubble
      if (currentBubbleMarker) { map.removeLayer(currentBubbleMarker); currentBubbleMarker = null; }
      // Abort in-flight summary
      if (lastSummaryAbort) { lastSummaryAbort.abort(); lastSummaryAbort = null; }
      // Key moment pins: keep on map after walk ends; only clear on explicit new walk
      if (clearMap) {
        keyMomentPins.forEach(p => map.removeLayer(p)); keyMomentPins = [];
      }

      if (clearMap) {
        if (navMarker)   { map.removeLayer(navMarker);   navMarker   = null; }
        if (navPolyline) { map.removeLayer(navPolyline); navPolyline = null; }
        walkSegments.forEach(s => map.removeLayer(s)); walkSegments = [];
        prevNavLatLng = null;
        if (destMarker)       { map.removeLayer(destMarker);       destMarker       = null; }
        if (plannedRouteLine) { map.removeLayer(plannedRouteLine); plannedRouteLine = null; }
        walkCircles.forEach(c => map.removeLayer(c)); walkCircles = [];
        navPoints = [];
      }
    }

    function showAwError(msg) {
      const el = document.getElementById('aw-error');
      el.textContent = `⚠ ${msg}`; el.style.display = '';
    }
    function clearAwError() { document.getElementById('aw-error').style.display = 'none'; }

    // ═══════════════════════════════════════════════════════
    // PERSONA
    // ═══════════════════════════════════════════════════════
    function onPersonaChange() {
      const p = document.getElementById('persona-select').value;
      if (p === currentPersona) return;
      log(`Persona: ${currentPersona} → ${p}`);
      currentPersona = p; cache = {}; agentIndex = -1;
      resetDisplay();
      if (agentMarker) { map.removeLayer(agentMarker); agentMarker = null; }
      if (trailLine)   { map.removeLayer(trailLine);   trailLine   = null; }
      if (currentMode === 'route') markers.forEach(m => m.setStyle(mStyle('default', false)));
      updateCounter();
      setStatus('Persona changed');
    }

    async function loadPersonas() {
      try {
        const r = await fetch(`${API}/personas`);
        const ps = await r.json();
        document.getElementById('persona-select').innerHTML = ps.map(p => {
          const label = p === 'objective' ? 'Objective' : p.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
          return `<option value="${p}">${label}</option>`;
        }).join('');
        log(`Loaded ${ps.length} personas`, 'ok');
      } catch(e) { log(`loadPersonas error: ${e.message}`, 'err'); }
    }

    // ═══════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════
    function renderResult(result) {
      showAnalysisBadge(false);
      if (result.image_base64) showImageB64(result.image_base64);
      renderScores(result.scores);
      renderReasoning(result.reasoning);
      document.getElementById('meta-line').textContent = `${result.processing_time_sec}s · ${result.persona}`;
    }

    function renderScores(scores) {
      const area = document.getElementById('scores-area');
      const dims = Object.keys(scores);
      if (!dims.length) { area.innerHTML = '<div class="ph">—</div>'; return; }
      area.innerHTML = dims.map(d => {
        const v = scores[d] ?? 0;
        return `<div class="score-row">
  <div class="score-hdr"><span class="dim-name">${escHtml(d)}</span><span class="dim-val">${v.toFixed(1)}</span></div>
  <div class="bar-track"><div class="bar-fill" id="bar-${d}" style="background:${scoreColor(v)}"></div></div>
</div>`;
      }).join('');
      requestAnimationFrame(() => dims.forEach(d => {
        const el = document.getElementById(`bar-${d}`);
        if (el) el.style.width = `${((scores[d]??0)/10)*100}%`;
      }));
      renderRadar(scores);
    }

    function renderReasoning(reasoning) {
      const area = document.getElementById('reasoning-area');
      const dims = Object.keys(reasoning);
      if (!dims.length) { area.innerHTML = '<div class="ph">—</div>'; return; }
      area.innerHTML = dims.map(d => `
<div class="r-item">
  <button class="r-btn open" onclick="toggleR('rd-${d}',this)">
    <span>${escHtml(d)}</span><span class="chev">▼</span>
  </button>
  <div class="r-body open" id="rd-${d}">${escHtml(reasoning[d]||'—')}</div>
</div>`).join('');
    }

    function toggleR(id, btn) {
      document.getElementById(id).classList.toggle('open');
      btn.classList.toggle('open');
    }

    // ── image helpers ──
    function showImageUrl(url) {
      if (panorama) panorama.setVisible(false);
      const img = document.getElementById('sv-image');
      img.onload = img.onerror = null; img.src = '';
      img.onload = () => { img.style.display='block'; document.getElementById('sv-hint').style.display='none'; showSpinner(false); flashSV(); log('Image displayed','ok'); };
      img.onerror = () => { showSpinner(false); log(`Image load failed: ${url}`,'err'); };
      log(`Fetching image: ${url.slice(0,60)}…`);
      img.src = url;
    }
    function showImageB64(b64) {
      if (panorama) panorama.setVisible(false);
      const img = document.getElementById('sv-image');
      img.src = `data:image/jpeg;base64,${b64}`;
      img.style.display = 'block';
      document.getElementById('sv-hint').style.display = 'none';
      showSpinner(false); flashSV();
    }
    function flashSV() {
      const p = document.getElementById('sv-pane');
      p.classList.remove('flash'); void p.offsetWidth; p.classList.add('flash');
    }
    function showSpinner(v) {
      const hint = document.getElementById('sv-hint');
      if (v) {
        hint.innerHTML = `<div class="mini-spin" style="width:20px;height:20px;border:2px solid #e5e5ea;border-top-color:#0071e3;border-radius:50%;animation:spin .7s linear infinite"></div><p>Loading…</p>`;
        hint.style.display = 'flex';
        document.getElementById('sv-image').style.display = 'none';
      }
    }
    function showAnalysisBadge(v, text='') {
      const b = document.getElementById('analysis-badge');
      b.style.display = v ? 'flex' : 'none';
      if (text) document.getElementById('analysis-badge-text').textContent = text;
    }
    function setBadge(text) {
      const b = document.getElementById('sv-badge');
      b.textContent = text; b.style.display = text ? 'block' : 'none';
    }
    function resetDisplay() {
      showAnalysisBadge(false);
      if (panorama) panorama.setVisible(false);
      const img = document.getElementById('sv-image');
      img.src = ''; img.style.display = 'none';
      document.getElementById('sv-hint').innerHTML = `<span class="icon">🗺</span><p>Select a waypoint or start Explore</p>`;
      document.getElementById('sv-hint').style.display = 'flex';
      setBadge(''); setAnalysisOverlay(null, null);
      document.getElementById('scores-area').innerHTML = '<div class="ph">—</div>';
      document.getElementById('reasoning-area').innerHTML = '<div class="ph">—</div>';
      document.getElementById('meta-line').textContent = '';
      document.getElementById('wp-info').innerHTML = '';
    }
    function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

    function openVlmLightbox() {
      const src = document.getElementById('vlm-thumb').src;
      if (!src) return;
      document.getElementById('vlm-lightbox-img').src = src;
      document.getElementById('vlm-lightbox-label').textContent =
        `Agent view · ${document.getElementById('vlm-heading-label').textContent}`;
      document.getElementById('vlm-lightbox').classList.add('open');
    }
    function closeVlmLightbox() {
      document.getElementById('vlm-lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeVlmLightbox();
    });
    </script>

  <!-- VLM image lightbox -->
  <div id="vlm-lightbox" onclick="closeVlmLightbox()">
    <button id="vlm-lightbox-close" onclick="closeVlmLightbox()">✕</button>
    <img id="vlm-lightbox-img" src="" alt="Agent view" onclick="event.stopPropagation()" />
    <div id="vlm-lightbox-label"></div>
  </div>

  <!-- Route Report overlay -->
  <div id="route-report-overlay">
    <div id="route-report-panel">
      <button class="rr-close" onclick="closeRouteReport()">&times;</button>
      <div class="rr-title">Route Report</div>
      <div class="rr-persona" id="rr-persona"></div>
      <div id="rr-badge-area"></div>
      <div id="rr-body"></div>
    </div>
  </div>
  </body>
</html>
